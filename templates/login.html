<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign In | Jundh AI</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>


<body>

    <div class="auth-glow glow-one"></div>

    <div class="auth-glow glow-two"></div>


    <main class="auth-page">


        <section class="auth-card">


            <div class="auth-logo">
                J
            </div>


            <h1>
                Welcome back
            </h1>


            <p class="subtitle">
                Sign in to continue to Jundh AI
            </p>


            {% if error %}

            <div class="error-message">
                {{ error }}
            </div>

            {% endif %}


            <form method="POST"
                  action="{{ url_for('login') }}">


                <div class="input-group">

                    <label>
                        Email or Username
                    </label>

                    <input
                        type="text"
                        name="login"
                        placeholder="Enter email or username"
                        autocomplete="username"
                        required
                    >

                </div>


                <div class="input-group">

                    <label>
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >

                </div>


                <button
                    type="submit"
                    class="auth-button">

                    Sign In

                </button>


            </form>


            <p class="auth-switch">

                Don't have an account?

                <a href="{{ url_for('register') }}">
                    Create Account
                </a>

            </p>


            <p class="auth-note">
                Your AI workspace, conversations and tools in one place.
            </p>


        </section>


    </main>


</body>

</html>
