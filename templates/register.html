<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | Jundh AI</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>


<body>

    <div class="auth-glow glow-one"></div>

    <div class="auth-glow glow-two"></div>


    <main class="auth-page">


        <section class="auth-card register-card">


            <div class="auth-logo">
                J
            </div>


            <h1>
                Create your account
            </h1>


            <p class="subtitle">
                Join Jundh AI and start your AI workspace
            </p>


            {% if error %}

            <div class="error-message">
                {{ error }}
            </div>

            {% endif %}


            <form method="POST"
                  action="{{ url_for('register') }}">


                <div class="input-group">

                    <label>
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        placeholder="Enter your full name"
                        autocomplete="name"
                        required
                    >

                </div>


                <div class="input-group">

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Choose a username"
                        autocomplete="username"
                        required
                    >

                </div>


                <div class="input-group">

                    <label>
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required
                    >

                </div>


                <div class="input-group">

                    <label>
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Create a password"
                        autocomplete="new-password"
                        minlength="8"
                        required
                    >

                </div>


                <button
                    type="submit"
                    class="auth-button">

                    Create Account

                </button>


            </form>


            <p class="auth-switch">

                Already have an account?

                <a href="{{ url_for('login') }}">
                    Sign In
                </a>

            </p>


            <p class="auth-note">
                Create an account to access Jundh AI and its tools.
            </p>


        </section>


    </main>


</body>

</html>
